<h1>{{title}}</h1>

<div class="previous-answers">
    <div class="done-questions">
        <article>
            <table>
                <tbody>
                    <tr class="section" id="trStartAgain">
                        <td id="td1StartAgain"></td>
                        <td id="td2StartAgain"></td>
                        <td class="link-right" id="td3StartAgain"><a class="start-right" id="startAgain" href="/calculate-stamp-duty-land-tax" onClick="ga('send', 'event', 'change', 'click', 'start-again')">Start again</a></td>
                    </tr>
                    <tr class="section" ng-repeat="item in data.summary">   
                        <td class="previous-question-title" id="td1_{{item.id}}">
                            <p class="{{item.isValid}}">
                                <span class="error-notification">Provide an answer to continue</span>
                                {{item.question}}
                            </p>
                        </td>
                        <td class="previous-question-body" id="td2_{{item.id}}" ng-if="item.type === undefined">{{item.answer}}</td>
                        <td class="previous-question-body" id="td2_{{item.id}}" ng-if="item.type === 'Date'">{{item.answer | date: 'd MMMM yyyy'}}</td>
                        <td class="previous-question-body" id="td2_{{item.id}}" ng-if="item.type === 'Currency'">{{item.answer | sdltCurrency: '£'}}</td>
                        <td class="link-right" id="td3_{{item.id}}"><a id="change_{{item.id}}" href="{{item.link}}" onClick="ga('send', 'event', 'change', 'click', {{item.id}})">Change <span class="visuallyhidden">{{item.hiddenText}}</span></a></td>
                    </tr>
                </tbody>
            </table>
        </article>
    </div>
</div>
<div class="form-group">
    <div ng-if="!validatedModel.isModelValid">
        Please fix any errors before continuing to calculation.
    </div>
    <button ng-click="submit()" class="button" id="calculate" type="submit">Calculate</button>
</div>
