<h1>{{title}}</h1>

<div id="pageErrors" class="flash error-summary" role="group" aria-labelledby="errorSummary" tabindex="-1">
    <h2 class="heading-medium error-summary-heading" id="errorSummary">There are problems with the information you provided</h2>
    <ul class="error-summary-list">
      <li ng-show="state.hasError('premium')"><a id="purchasePricePageErrMsg" href="javascript:void(0)" data-ng-click="jumpTo('premium')">{{state.validationMessage('premium')}}</a></li>
    </ul>
</div>

<form name="priceForm" class="form">

    <div class="form-group {{state.hasError('premium')}}">
        <label for="purchasePrice">
            <span class="form-label-bold">Enter the price.</span>
            <span class="form-hint">This is the chargeable consideration.</span>
            <span id="purchasePriceErrMsg" class="error-notification">{{state.validationMessage('premium')}}</span>
        </label>            
        &pound; <input id="purchasePrice" class="form-control form-control-1-8" ng-model="data.premium" name="premium" type="text" required>
    </div>

    <div class="form-group">
        <a ng-click="submit()">
            <button id="next-price" type="submit">Continue</button>
        </a>
    </div>
    <div class="form-group">
        <a id="back-price" href="javascript:history.back()">Back</a>
    </div>

</form>
