<h1>{{title}}</h1>

<div id="pageErrors" class="flash error-summary" role="group" aria-labelledby="errorSummary" tabindex="-1">
    <h2 class="heading-medium error-summary-heading" id="errorSummary">There are problems with the information you provided</h2>
    <ul class="error-summary-list">
      <li ng-if="state.hasError('premium')"><a id="purchasePricePageErrMsg" href="javascript:return false" onclick="return false;" data-ng-click="jumpTo('premium')">{{state.validationMessage('premium')}}</a></li>
    </ul>
</div>

<form name="priceForm" class="form">

    <div class="form-group {{state.hasError('premium')}}">
        <label for="premium">
            <span class="form-label-bold">Enter the price.</span>
            <span class="form-hint">This is the chargeable consideration.</span>
            <span id="purchasePriceErrMsg" class="error-notification">{{state.validationMessage('premium')}}</span>
        </label>            
        &pound; <input id="premium" class="form-control form-control-1-4" maxlength="10" ng-model="data.premium" name="premium" type="text" required>
    </div>

    <details>
        <summary><span id="premium-help" class="summary" onClick="ga('send', 'event', 'help', 'click', 'premium-help')">Is your chargeable consideration less than £40,000?</span></summary>
        <div class="panel panel-border-narrow text">
            <p>
                If the purchase price is £40,000 or under, then no SDLT is due and a return does not have to be filed.
            </p>
        </div>
    </details>

    <div class="form-group">
        <button ng-click="submit()" class="button" id="next-price" type="submit">Continue</button>
    </div>

</form>
