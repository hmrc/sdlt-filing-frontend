<div id="pageErrors" class="flash govuk-error-summary" role="group" aria-labelledby="errorSummary" tabindex="-1" data-module="govuk-error-summary">
    <h2 class="govuk-error-summary__title" id="errorSummary">There is a problem</h2>
    <div class="govuk-error-summary__body">
        <ul class="govuk-list govuk-error-summary__list">
          <li data-ng-if="state.hasError('premium')"><a id="purchasePricePageErrMsg" href="" data-ng-click="jumpTo('premium')">{{state.validationMessage('premium')}}</a>
              <script>
                    document.getElementById("purchasePricePageErrMsg").addEventListener("click", function() {
                    return false;
                    }, false);
              </script>
          </li>
        </ul>
    </div>
</div>

<form name="priceForm" class="form">

    <div class="govuk-form-group" ng-class="{'govuk-form-group--error': state.hasError('premium')}">
        <fieldset class="govuk-fieldset" aria-describedby="premium-hint">
            <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
                <h1 class="govuk-label-wrapper">
                    <label class="govuk-label govuk-label--l" for="premium">Enter the purchase price</label>
                </h1>
            </legend>
            <span id="purchasePriceErrMsg" class="govuk-error-message" data-ng-if="state.hasError('premium')">
                <span class="govuk-visually-hidden">Error:</span> {{state.validationMessage('premium')}}
            </span>
            <div id="premium-hint" class="govuk-hint">
                This is the chargeable consideration.
            </div>
            <div class="govuk-input__wrapper">
                <div class="govuk-input__prefix" aria-hidden="true">£</div>
                <input class="govuk-input govuk-input--width-10" id="premium" maxlength="10" data-ng-model="data.premium" name="premium" type="text">
            </div>
        </fieldset>
    </div>
    <details class="govuk-details" data-module="govuk-details">
        <summary class="govuk-details__summary" data-ng-click="toggleHelp('chargeableConsideration','purchasePrice.chargeableConsideration')"><span class="govuk-details__summary-text">Is your chargeable consideration less than £40,000?</span></summary>
        <div class="govuk-details__text" data-ng-if="displayHelp('chargeableConsideration')">
            <p class="govuk-body">If the purchase price is less than £40,000, you don't need to pay SDLT or file a return.</p>
        </div>
    </details>

    <div class="govuk-form-group">
        <button data-ng-click="submit()" class="govuk-button" data-module="govuk-button" id="continue-button" type="submit">Continue</button>
    </div>

</form>
