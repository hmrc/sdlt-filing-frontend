<h1>{{title}}</h1>

<div id="pageErrors" class="flash error-summary" role="group" aria-labelledby="errorSummary" tabindex="-1">
    <h2 class="heading-medium error-summary-heading" id="errorSummary">There are problems with the information you provided</h2>
    <ul class="error-summary-list">
      <li ng-if="state.hasError('premium')"><a id="premiumPageErrMsg" href="javascript:return false" onclick="return false;" data-ng-click="jumpTo('premium')">{{state.validationMessage('premium')}}</a></li>
    </ul>
</div>

<form name="premiumForm" class="form">

    <div class="form-group {{state.hasError('premium')}}">
        <label for="premium">
            <span class="form-label-bold">Total premium payable.</span>
            <span class="form-hint">Find this in your lease.</span>
            <span id="premiumErrMsg" class="error-notification">{{state.validationMessage('premium')}}</span>
        </label>            
        &pound; <input id="premium" maxlength="10" ng-model="data.premium" name="premium" type="text" required>
    </div>

    <div ng-show="showPremiumHelp">
        <details>
            <summary ng-click="toggleHelp('leasePremium','premium.leasePremium')"><span class="summary">Is your lease premium less than £40,000?</span></summary>
            <div class="panel-indent" ng-if="displayHelp('leasePremium')">
                <p>You don't have to pay SDLT or file a return if the premium is less than £40,000 and tax isn't due on the rent.</p>
            </div>
        </details>
    </div>

    <div class="form-group">
         <button ng-click="submit()" class="button" id="continue-button" type="submit">Continue</button>
    </div>

</form>
