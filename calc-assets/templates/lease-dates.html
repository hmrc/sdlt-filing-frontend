<h1>{{title}}</h1>

<div id="pageErrors" class="flash error-summary" role="group" aria-labelledby="errorSummary" tabindex="-1">
    <h2 class="heading-medium error-summary-heading" id="errorSummary">There are problems with the information you provided</h2>
    <ul class="error-summary-list">
      <li ng-if="state.hasError('startDate')"><a id="leaseStartDatePageErrMsg" class="error-link" onclick="javascript:void(0)" data-ng-click="jumpTo('leaseStartDateDay')">{{state.validationMessage('startDate')}}</a></li>
      <li ng-if="state.hasError('endDate')"><a id="leaseEndDatePageErrMsg" class="error-link" onclick="javascript:void(0)" data-ng-click="jumpTo('leaseEndDateDay')">{{state.validationMessage('endDate')}}</a></li>
    </ul>
</div>

<form name="leaseDatesForm" class="form">

    <div class="form-group {{state.hasError('startDate')}}">
        <fieldset>
            <legend class="form-label-bold">Start date shown in your lease.</legend>
            <label class="form-hint">This is the date your term starts.</label>
            <label class="form-hint">For example, 31 3 2014.</label>
            <span id="leaseStartDateErrMsg" class="error-notification">{{state.validationMessage('startDate')}}</span>
            <div class="form-date">
                <div class="form-group form-group-day">
                  <label for="leaseStartDateDay">Day</label>
                  <input class="form-control" id="leaseStartDateDay" ng-model="data.startDateDay" ng-change="updateStartDate()" type="text" pattern="[0-9]*" min="0" max="31" maxlength="2" required>
                </div>
                <div class="form-group form-group-month">
                  <label for="leaseStartDateMonth">Month</label>
                  <input class="form-control" id="leaseStartDateMonth" ng-model="data.startDateMonth"  ng-change="updateStartDate()" type="text" pattern="[0-9]*" min="0" max="12" maxlength="2" required>
                </div>
                <div class="form-group form-group-year">
                  <label for="leaseStartDateYear">Year</label>
                  <input class="form-control" id="leaseStartDateYear" ng-model="data.startDateYear"  ng-change="updateStartDate()" type="text" pattern="[0-9]*" min="0" maxlength="4" required>
                </div>
              </div>
        </fieldset>
    </div>

    <div class="form-group {{state.hasError('endDate')}}">
        <fieldset>
            <legend class="form-label-bold">End date shown in your lease.</legend>
            <label class="form-hint">This is the date your term ends.</label>
            <label class="form-hint">For example, 31 3 2017.</label>
            <span id="leaseEndDateErrMsg" class="error-notification">{{state.validationMessage('endDate')}}</span>
            <div class="form-date">
                <div class="form-group form-group-day">
                  <label for="leaseEndDateDay">Day</label>
                  <input class="form-control" id="leaseEndDateDay" ng-model="data.endDateDay" ng-change="updateEndDate()" type="text" pattern="[0-9]*" min="0" max="31" maxlength="2" required>
                </div>
                <div class="form-group form-group-month">
                  <label for="leaseEndDateMonth">Month</label>
                  <input class="form-control" id="leaseEndDateMonth" ng-model="data.endDateMonth"  ng-change="updateEndDate()" type="text" pattern="[0-9]*" min="0" max="12" maxlength="2" required>
                </div>
                <div class="form-group form-group-year">
                  <label for="leaseEndDateYear">Year</label>
                  <input class="form-control" id="leaseEndDateYear" ng-model="data.endDateYear"  ng-change="updateEndDate()" type="text" pattern="[0-9]*" min="0" maxlength="4" required>
                </div>
              </div>
        </fieldset>
    </div>

    <div class="form-group">
        <button ng-click="submit()" class="button" id="next-lease-dates" type="submit">Continue</button>
    </div>

</form>
