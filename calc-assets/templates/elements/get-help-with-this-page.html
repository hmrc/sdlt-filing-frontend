<div class="report-error">
	<a class="report-error__toggle" href="form-label">Get help with this page.</a>
	<div class="report-error__content js-hidden">
                    <h3 class="h2-heading">Get help using this service</h3>
                    <p>
                    Don’t include any personal or financial information. For example, your National Insurance or credit card numbers.
                    </p>
                    

<form action="/calculate-stamp-duty-land-tax/contact/global_problem_report" method="POST" class="form form--feedback" novalidate="novalidate">    
                        <fieldset>
                            <div class="form-group-compound">
                                <label for="report-name" class="form-label">Name</label>
                                <input id="report-name" maxlength="70" class="input--fullwidth" name="report-name" type="text" data-rule-letterswithbasicpunc="true" data-rule-required="true" data-msg-required="Please provide your name." aria-required="true">
                            </div>
                            <div class="form-group-compound">
                                <label for="report-email" class="form-label">Email</label>
                                <input id="report-email" maxlength="255" class="input--fullwidth" name="report-email" type="text" data-rule-required="true" data-rule-email="true" data-msg-required="Please provide your email address." aria-required="true">
                            </div>
                            <div class="form-group-compound">
                                <label for="report-action" class="form-label">What were you doing?</label>
                                <input id="report-action" maxlength="1000" class="input--fullwidth" name="report-action" type="text" data-rule-required="true" data-msg-required="Please enter details of what you were doing." aria-required="true">
                            </div>
                            <div class="form-group-compound">
                                <label for="report-error" class="form-label">What do you need help with?</label>
                                <input id="report-error" maxlength="1000" class="input--fullwidth" name="report-error" type="text" data-rule-required="true" data-msg-required="Please enter details of what went wrong." aria-required="true">
                            </div>
                            <input type="hidden" name="isJavascript" value="true">
                            <div class="form-field">
                                <button id="report-submit" class="button" type="submit" data-journey-click="page:Click:Get help with this page Submit">Send</button>
                            </div>
                        </fieldset>
					</form>
                </div>
            </div>
