<h1>{{title}}</h1>

<div id="pageErrors" class="flash error-summary" role="group" aria-labelledby="errorSummary" tabindex="-1">
    <h2 class="heading-medium error-summary-heading" id="errorSummary">There are problems with the information you provided</h2>
    <ul class="error-summary-list">
        <li ng-if="state.hasError('currentValue')"><a id="currentValuePageErrMsg" href="javascript:return false" onclick="return false;" data-ng-click="jumpTo('currentValue')">{{state.validationMessage('currentValue')}}</a></li>
    </ul>
</div>

<form name="currentValueForm" class="form">

    <div class="form-group {{state.hasError('currentValue')}}">
        <fieldset>
            <legend id="currentValue" class="form-label-bold">Is the current market value of the property £500,000 or less?</legend>
            <span id="currentValueErrMsg" class="error-notification">{{state.validationMessage('currentValue')}}</span>
            <div class="inline">
                <label class="block-label" for="currentValue-yes">
                    <input id="currentValue-yes" ng-model="data.currentValue" name="currentValue" value="Yes" type="radio" required>Yes
                </label>
                <label class="block-label" for="currentValue-no">
                    <input id="currentValue-no" ng-model="data.currentValue" name="currentValue" value="No" type="radio" required>No
                </label>
            </div>
        </fieldset>
    </div>

    <div class="form-group">
        <button ng-click="submit()" class="button" id="continue-button" type="submit" onClick="ga('send', 'event', 'button', 'click', '/currentValue')">Continue</button>
    </div>

</form>
