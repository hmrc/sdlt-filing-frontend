<h1>{{title}}</h1>

<form name="introForm" class="form">
    
  <div class="form-group">

    <p>Use this calculator to work out your SDLT for:</p>
    <div class="js-tab-content tab-content tabs-body">
      <ul class="list-bullet">
        <li>
            <p>residential freehold or leasehold property transactions</p>
        </li>
        <li>
            <p>non-residential (including mixed) freehold or leasehold property transactions</p>
        </li>
      </ul>
    </div>

  </div>
    
  <div class="form-group">
        <button id="start" class="button" ng-click="startNow()" href="javascript:void(0)">Start now</button>
  </div>

</form>
