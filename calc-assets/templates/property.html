<div class="form-group">
    <a id="back-property" href="javascript:history.back()">Back</a>
</div>

<h1>{{title}}</h1>

<div id="pageErrors" class="flash error-summary" role="group" aria-labelledby="errorSummary" tabindex="-1">
    <h2 class="heading-medium error-summary-heading" id="errorSummary">There are problems with the information you provided</h2>
    <ul class="error-summary-list">
      <li ng-show="state.hasError('propertyType')"><a id="propertyTypePageErrMsg" href="javascript:void(0)" data-ng-click="jumpTo('propertyType')">{{state.validationMessage('propertyType')}}</a></li>
    </ul>
</div>

<form name="propertyForm" class="form">

    <div class="form-group {{state.hasError('propertyType')}}">
        <fieldset>
            <legend id="propertyType" class="form-label-bold">Is the transaction residential or non-residential?</legend>
            <span class="form-hint">If it's a mixed transaction, choose 'Non-residential'.</span>
            <span id="propertyTypeErrMsg" class="error-notification">{{state.validationMessage('propertyType')}}</span>
            <div class="inline">
                <label class="block-label" for="residential">
                    <input id="residential" ng-model="data.propertyType" name="propertyType" value="Residential" type="radio" required>Residential
                </label>
                <label class="block-label" for="non-residential">
                    <input id="non-residential" ng-model="data.propertyType" name="propertyType" value="Non-residential" type="radio" required>Non-residential
                </label>
            </div>
        </fieldset>
    </div>

    <div class="form-group">
        <a ng-click="submit()">
            <button id="next-property" type="submit">Next</button>
        </a>
    </div>
    

</form>
