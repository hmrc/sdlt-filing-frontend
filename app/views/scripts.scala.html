<script>
        var regex = /\/calculate-stamp-duty-land-tax\/#\//;
        if(!(document.location.href).match(regex)) {
         window.location = document.location.href.split("/calculate-stamp-duty-land-tax",1) + "/calculate-stamp-duty-land-tax/#/";
        }

        // catches page refreshes and navigating away from the service
        window.onbeforeunload = function () {
         return "If you leave this page all the information you've entered won't be saved - you'll need to start again.";
        };
</script>

</script>

<script>
        function setCookie (name, value, duration, domain) {
         var secure = window.location.protocol.indexOf('https') ? '' : '; secure'
         var cookieDomain = ""
         if (domain) {
          cookieDomain = '; domain=' + domain
         }
         var expires = ""
         if (duration) {
          var date = new Date()
          date.setTime(date.getTime() + (duration * 24 * 60 * 60 * 1000))
          expires = '; expires=' + date.toGMTString()
         }
         document.cookie = name + '=' + value + expires + cookieDomain + '; path=/' + secure
        }
</script>
