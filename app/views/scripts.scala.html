@import config.FrontendAppConfig
@import views.html.helper.CSPNonce
@import play.api.mvc.Request

@this(appConfig: FrontendAppConfig)

@()(implicit request: Request[_]))

<script @CSPNonce.attr src='@{routes.Assets.versioned("javascript/jquery-3.7.1.min.js")}' type="text/javascript"></script>

<script @CSPNonce.attr src='@{routes.Assets.versioned("javascript/angular.min.js")}'></script>
<script @CSPNonce.attr src='@{routes.Assets.versioned("javascript/angular-sanitize.js")}'></script>
<script @CSPNonce.attr src='@{routes.Assets.versioned("javascript/angular-route.js")}'></script>

<script @CSPNonce.attr src='@{routes.Assets.versioned("javascript/calc.js")}'></script>
<script @CSPNonce.attr src='@{routes.Assets.versioned("javascript/calc-templates.js")}'></script>

<script @CSPNonce.attr src='@controllers.routes.Assets.versioned("lib/govuk-frontend/dist/govuk/all.js")'></script>

<script

        @CSPNonce.attr>
        var regex = /\/calculate-stamp-duty-land-tax\/#!\//;
        if(!(document.location.href).match(regex)) {
         window.location = document.location.href.split("/calculate-stamp-duty-land-tax",1) + "/calculate-stamp-duty-land-tax/#!/";
        }

        // catches page refreshes and navigating away from the service
        window.onbeforeunload = function () {
         return "If you leave this page all the information you've entered won't be saved - you'll need to start again.";
        };
</script>

<script

        @CSPNonce.attr>
        (function() {
         if (navigator.userAgent.match(/IEMobile\/10\.0/)) {
          var d = document,
                  c = "appendChild",
                  a = d.createElement("style");
          a[c](d.createTextNode("@@-ms-viewport{width:auto!important}"));
          d.getElementsByTagName("head")[0][c](a);
         }
        })();
</script>

<script

        @CSPNonce.attr>
        function setCookie (name, value, duration, domain) {
         var secure = window.location.protocol.indexOf('https') ? '' : '; secure'
         var cookieDomain = ""
         if (domain) {
          cookieDomain = '; domain=' + domain
         }
         var expires = ""
         if (duration) {
          var date = new Date()
          date.setTime(date.getTime() + (duration * 24 * 60 * 60 * 1000))
          expires = '; expires=' + date.toGMTString()
         }
         document.cookie = name + '=' + value + expires + cookieDomain + '; path=/' + secure
        }
</script>

<script
        @CSPNonce.attr>
        document.body.className = ((document.body.className) ? document.body.className + ' js-enabled' : 'js-enabled');
</script>
