<div id="pageErrors" class="flash error-summary" role="group" aria-labelledby="errorSummary" tabindex="-1">
    <h2 class="heading-medium error-summary-heading" id="errorSummary">There are problems with the information you provided</h2>
    <p>Optional description of the error(s) and how to correct them</p>
    <ul class="error-summary-list">
      <li ng-show="state.hasError('holdingType')"><a href="javascript:void(0)" data-ng-click="jumpTo('holdingType')">{{state.validationMessage('holdingType')}}</a></li>
    </ul>
</div>

<h1 class="form-title heading-large">Freehold or leasehold</h1>

<form name="holdingForm" class="form">

    <div class="form-group {{state.hasError('holdingType')}}">
        <fieldset>
            <legend id="holdingType" class="form-label">Is the property freehold or leasehold?</legend>
            <span class="error-notification">{{state.validationMessage('holdingType')}}</span>
            <div class="inline">
                <label class="block-label" for="holding-free">
                    <input id="holding-free" ng-model="data.holdingType" name="holdingType" value="Freehold" type="radio" required>Freehold
                </label>
                <label class="block-label" for="holding-lease">
                    <input id="holding-lease" ng-model="data.holdingType" name="holdingType" value="Leasehold" type="radio" required>Leasehold
                </label>
            </div>
        </fieldset>
    </div>

    <div class="form-group">
        <a ng-click="submit()">
            <button id="next-holding" type="submit">Next</button>
        </a>
    </div>
    <div class="form-group">
        <a id="back-holding" href="javascript:history.back()">Back</a>
    </div>

</form>
