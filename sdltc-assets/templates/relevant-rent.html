<h1>{{title}}</h1>

<div id="pageErrors" class="flash error-summary" role="group" aria-labelledby="errorSummary" tabindex="-1">
    <h2 class="heading-medium error-summary-heading" id="errorSummary">There are problems with the information you provided</h2>
    <ul class="error-summary-list">
      <li ng-show="state.hasError('relevantRent')"><a id="summaryErrMsg" href="javascript:void(0)" data-ng-click="jumpTo('relevantRent')">{{state.validationMessage('relevantRent')}}</a></li>
    </ul>
</div>

<form name="relevantRentForm" class="form">

    <div class="form-group {{state.hasError('relevantRent')}}">
        <label for="relevantRent">
            <span class="form-label">Relevant Rental Figure</span>
            <span class="error-notification">{{state.validationMessage('relevantRent')}}</span>
        </label>            
        &pound; <input id="relevantRent" class="form-control form-control-1-8" ng-model="data.relevantRent" name="relevantRent" type="text" required>
    </div>

    <div class="form-group">
        <a ng-click="submit()">
            <button id="next-relevantRent" type="submit">Next</button>
        </a>
    </div>
    <div class="form-group">
        <a id="back-relevantRent" href="javascript:history.back()">Back</a>
    </div>

</form>
