<div id="pageErrors" class="flash error-summary" role="group" aria-labelledby="errorSummary" tabindex="-1">
    <h2 class="heading-medium error-summary-heading" id="errorSummary">There are problems with the information you provided</h2>
    <p>Optional description of the error(s) and how to correct them</p>
    <ul class="error-summary-list">
      <li ng-show="state.hasError('startDate')"><a href="javascript:void(0)" data-ng-click="jumpTo('startDate')">{{state.validationMessage('startDate')}}</a></li>
      <li ng-show="state.hasError('endDate')"><a href="javascript:void(0)" data-ng-click="jumpTo('endDate')">{{state.validationMessage('endDate')}}</a></li>
    </ul>
</div>

<h2 class="heading-medium">Lease Dates</h1>

<form name="leaseDatesForm" class="form">

    <div class="form-group {{state.hasError('startDate')}}">
        <label for="startDate">
            <span class="form-label">Start Date as specified in lease</span>
            <span class="error-notification">{{state.validationMessage('startDate')}}</span>
        </label>            
        <input id="startDate" class="form-control form-control-1-8" ng-model="data.startDate" name="startDate" type="text" required>
    </div>

    <div class="form-group {{state.hasError('endDate')}}">
        <label for="endDate">
            <span class="form-label">End Date as specified in lease</span>
            <span class="error-notification">{{state.validationMessage('endDate')}}</span>
        </label>            
        <input id="endDate" class="form-control form-control-1-8" ng-model="data.endDate" name="endDate" type="text" required>
    </div>

    <div class="form-group">
        <a ng-click="submit()">
            <button id="next-lease-dates" type="submit">Next</button>
        </a>
    </div>
    <div class="form-group">
        <a id="back-lease-dates" href="javascript:history.back()">Back</a>
    </div>

</form>
