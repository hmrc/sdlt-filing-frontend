include "frontend.conf"

appName="sdltc-frontend"

# An ApplicationLoader that uses Guice to bootstrap the application.
play.application.loader = "uk.gov.hmrc.play.bootstrap.ApplicationLoader"

# Primary entry point for all HTTP requests on Play applications
play.http.requestHandler = "uk.gov.hmrc.play.bootstrap.http.RequestHandler"

# Provides an implementation of AuditConnector. Use `uk.gov.hmrc.play.bootstrap.AuditModule` or create your own.
# An audit connector must be provided.
play.modules.enabled += "uk.gov.hmrc.play.bootstrap.AuditModule"

# Provides an implementation of MetricsFilter. Use `uk.gov.hmrc.play.bootstrap.graphite.GraphiteMetricsModule` or create your own.
# A metric filter must be provided
play.modules.enabled += "uk.gov.hmrc.play.bootstrap.graphite.GraphiteMetricsModule"

# Provides an implementation and configures all filters required by a Platform frontend microservice.
play.modules.enabled += "uk.gov.hmrc.play.bootstrap.FrontendModule"
play.http.filters = "uk.gov.hmrc.play.bootstrap.filters.FrontendFilters"

# Custom error handler
play.http.errorHandler = "config.frontendErrorHandler"
play.http.filters = "config.SDLTCFilters"

# Play 2.5 Upgrade
play.filters.enabled += "play.filters.headers.SecurityHeadersFilter"
play.filters.headers.contentSecurityPolicy = "base-uri 'self';block-all-mixed-content;child-src 'none';connect-src 'self' https://www.google-analytics.com;default-src 'self' 'unsafe-inline' localhost:9250 localhost:9514 www.google-analytics.com analytics.analytics-egain.com data:;form-action 'self';frame-ancestors 'none';script-src 'self' 'unsafe-inline' ajax.googleapis.com www.google-analytics.com cdn.optimizely.com; object-src 'none';"

play.http.router=prod.Routes

# Assets configuration
# ~~~~~
# For now just some (very short) test settings to prove it works as expected - i.e. control over the individual resources
"assets.cache./public/index.html"="public, max-age=900, s-maxage=900" # 15 minutes
"assets.cache./public/javascript/calc.js"="public, max-age=31536000" # 1 year (365 days)
"assets.cache./public/javascript/calc-templates.js"="public, max-age=31536000" # 1 year (365 days)

# Override the allowed cache types to include HTML for this application
caching.allowedContentTypes=["image/", "text/css", "application/javascript", "text/html"]


microservice {
  metrics {
    graphite {
      host = graphite
      port = 2003
      prefix = play.${appName}.
      enabled = false
    }
    name = ${appName}
    rateUnit = SECONDS
    durationUnit = SECONDS
    showSamples = true
    jvm = true
    enabled = false
    extraMeasured = []
  }
}

google-analytics {
  token=N/A
  host=auto
}


assets {
  version = "2.254.0"
  version = ${?ASSETS_FRONTEND_VERSION}
  url = "http://localhost:9032/assets/"
}

optimizely {
  projectId = "123456789"
}

auditing {
  enabled=false
  traceRequests=true
  consumer {
    baseUri {
      host = localhost
      port = 8100
    }
  }
}

# By default all controllers will have logging enabled.
# The below controllers are the default exceptions to this rule.

controllers {
  com.kenshoo.play.metrics.MetricsController = {
    needsLogging = false
  }
  uk.gov.hmrc.play.health.AdminController = {
    needsLogging = false
  }
}

feedback-survey-frontend {
  url="http://localhost:9514/feedback-survey/?origin=SDLTC"
}